name: CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v2

      - name: set up python
        uses: actions/setup-python@v2
        with:
          python-version: "3.10"

      - name: install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest

      - name: Build Docker image
        run: docker build -t hello-app .

      - name: Run container
        run: |
          docker run -d -p 8080:80 hello-app

      - name: Test website
        run: |
          curl http://localhost:8080

      - name: log in to Docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERUSR}}
          password: ${{ secrets.DOCKERPSWD }}

      - name: Push image
        run: docker push abdulbasid310/hello-app:latest



         